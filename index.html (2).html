<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadFlow - Mini CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f1f5f9;--text2:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#06b6d4;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:16px}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:12px}
header h1{font-size:24px;background:linear-gradient(135deg,var(--primary),var(--info));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:4px}
.tab{padding:8px 16px;border:none;background:none;color:var(--text2);cursor:pointer;border-radius:6px;font-size:14px;transition:.2s}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){background:var(--surface2)}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-card .label{font-size:13px;color:var(--text2);margin-bottom:4px}
.stat-card .value{font-size:32px;font-weight:700}
.stat-card.total .value{color:var(--primary)}
.stat-card.converted .value{color:var(--success)}
.stat-card.pending .value{color:var(--warning)}
.stat-card.lost .value{color:var(--danger)}
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input,.toolbar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:14px;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--primary)}
.toolbar input{flex:1;min-width:200px}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
th,td{text-align:left;padding:12px;font-size:14px}
th{background:var(--surface2);color:var(--text2);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.5px}
tr:not(:last-child) td{border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(59,130,246,.05)}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
.badge-new{background:rgba(6,182,212,.15);color:var(--info)}
.badge-contacted{background:rgba(245,158,11,.15);color:var(--warning)}
.badge-converted{background:rgba(34,197,94,.15);color:var(--success)}
.badge-lost{background:rgba(239,68,68,.15);color:var(--danger)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:20px;font-size:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-size:14px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.form-group .error{border-color:var(--danger)}
.form-group .error-msg{color:var(--danger);font-size:12px;margin-top:2px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius);color:#fff;font-size:14px;z-index:200;animation:slideIn .3s;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:48px;color:var(--text2)}
.actions{display:flex;gap:4px}
@media(max-width:768px){table{display:block;overflow-x:auto}.dashboard{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.dashboard{grid-template-columns:1fr}.toolbar{flex-direction:column}}
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>⚡ LeadFlow CRM</h1>
    <div class="tabs">
      <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
      <button class="tab" onclick="showTab('leads')">Leads</button>
    </div>
  </header>

  <div id="dashboard-tab">
    <div class="dashboard">
      <div class="stat-card total"><div class="label">Total Leads</div><div class="value" id="s-total">0</div></div>
      <div class="stat-card converted"><div class="label">Converted</div><div class="value" id="s-converted">0</div></div>
      <div class="stat-card pending"><div class="label">Pending (New + Contacted)</div><div class="value" id="s-pending">0</div></div>
      <div class="stat-card lost"><div class="label">Lost</div><div class="value" id="s-lost">0</div></div>
    </div>
    <h3 style="margin-bottom:12px">Upcoming Follow-ups</h3>
    <div id="followups"></div>
  </div>

  <div id="leads-tab" class="hidden">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by name, email, company..." oninput="renderLeads()">
      <select id="filter" onchange="renderLeads()">
        <option value="all">All Statuses</option>
        <option value="New">New</option>
        <option value="Contacted">Contacted</option>
        <option value="Converted">Converted</option>
        <option value="Lost">Lost</option>
      </select>
      <button class="btn btn-primary" onclick="openForm()">+ Add Lead</button>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="leads-table"></div>
  </div>
</div>

<div id="modal" class="modal-overlay hidden" onclick="event.target===this&&closeForm()">
  <div class="modal">
    <h2 id="form-title">Add Lead</h2>
    <form id="lead-form" onsubmit="saveLead(event)">
      <input type="hidden" id="f-id">
      <div class="form-group"><label>Name *</label><input id="f-name" required></div>
      <div class="form-group"><label>Email</label><input id="f-email" type="email"></div>
      <div class="form-group"><label>Phone</label><input id="f-phone"></div>
      <div class="form-group"><label>Company</label><input id="f-company"></div>
      <div class="form-group"><label>Status</label>
        <select id="f-status"><option>New</option><option>Contacted</option><option>Converted</option><option>Lost</option></select>
      </div>
      <div class="form-group"><label>Follow-up Date</label><input id="f-followup" type="date"></div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes"></textarea></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
const LS_KEY='leadflow_leads';
const getLeads=()=>JSON.parse(localStorage.getItem(LS_KEY)||'[]');
const saveLeads=d=>localStorage.setItem(LS_KEY,JSON.stringify(d));

function showTab(t){
  document.getElementById('dashboard-tab').classList.toggle('hidden',t!=='dashboard');
  document.getElementById('leads-tab').classList.toggle('hidden',t!=='leads');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='dashboard'?0:1)));
  if(t==='dashboard')renderDashboard();else renderLeads();
}

function renderDashboard(){
  const leads=getLeads();
  document.getElementById('s-total').textContent=leads.length;
  document.getElementById('s-converted').textContent=leads.filter(l=>l.status==='Converted').length;
  document.getElementById('s-pending').textContent=leads.filter(l=>l.status==='New'||l.status==='Contacted').length;
  document.getElementById('s-lost').textContent=leads.filter(l=>l.status==='Lost').length;
  const today=new Date().toISOString().split('T')[0];
  const upcoming=leads.filter(l=>l.followup&&l.followup>=today).sort((a,b)=>a.followup.localeCompare(b.followup)).slice(0,10);
  const fu=document.getElementById('followups');
  if(!upcoming.length){fu.innerHTML='<div class="empty">No upcoming follow-ups</div>';return;}
  fu.innerHTML='<table><thead><tr><th>Date</th><th>Name</th><th>Company</th><th>Status</th></tr></thead><tbody>'+
    upcoming.map(l=>`<tr><td>${l.followup}</td><td>${esc(l.name)}</td><td>${esc(l.company||'—')}</td><td><span class="badge badge-${l.status.toLowerCase()}">${l.status}</span></td></tr>`).join('')+'</tbody></table>';
}

function renderLeads(){
  const leads=getLeads();const q=document.getElementById('search').value.toLowerCase();const f=document.getElementById('filter').value;
  const filtered=leads.filter(l=>{
    const match=!q||[l.name,l.email,l.company].some(v=>(v||'').toLowerCase().includes(q));
    const st=f==='all'||l.status===f;return match&&st;
  });
  const el=document.getElementById('leads-table');
  if(!filtered.length){el.innerHTML='<div class="empty">No leads found</div>';return;}
  el.innerHTML='<table><thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Status</th><th>Follow-up</th><th>Actions</th></tr></thead><tbody>'+
    filtered.map(l=>`<tr>
      <td><strong>${esc(l.name)}</strong></td>
      <td>${esc(l.email||'—')}</td>
      <td>${esc(l.company||'—')}</td>
      <td><span class="badge badge-${l.status.toLowerCase()}">${l.status}</span></td>
      <td>${l.followup||'—'}</td>
      <td class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openForm('${l.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteLead('${l.id}')">Delete</button>
      </td></tr>`).join('')+'</tbody></table>';
}

function openForm(id){
  const form=document.getElementById('lead-form');form.reset();
  if(id){
    const l=getLeads().find(x=>x.id===id);if(!l)return;
    document.getElementById('form-title').textContent='Edit Lead';
    document.getElementById('f-id').value=l.id;
    document.getElementById('f-name').value=l.name;
    document.getElementById('f-email').value=l.email||'';
    document.getElementById('f-phone').value=l.phone||'';
    document.getElementById('f-company').value=l.company||'';
    document.getElementById('f-status').value=l.status;
    document.getElementById('f-followup').value=l.followup||'';
    document.getElementById('f-notes').value=l.notes||'';
  }else{document.getElementById('form-title').textContent='Add Lead';document.getElementById('f-id').value='';}
  document.getElementById('modal').classList.remove('hidden');
}

function closeForm(){document.getElementById('modal').classList.add('hidden');}

function saveLead(e){
  e.preventDefault();
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Name is required','error');return;}
  const email=document.getElementById('f-email').value.trim();
  if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Invalid email','error');return;}
  const leads=getLeads();const id=document.getElementById('f-id').value;
  const data={name,email,phone:document.getElementById('f-phone').value.trim(),company:document.getElementById('f-company').value.trim(),status:document.getElementById('f-status').value,followup:document.getElementById('f-followup').value,notes:document.getElementById('f-notes').value.trim()};
  if(id){const i=leads.findIndex(l=>l.id===id);if(i>-1){leads[i]={...leads[i],...data};toast('Lead updated','success');}}
  else{leads.unshift({id:crypto.randomUUID(),...data,created:new Date().toISOString()});toast('Lead added','success');}
  saveLeads(leads);closeForm();renderLeads();renderDashboard();
}

function deleteLead(id){
  if(!confirm('Delete this lead?'))return;
  const leads=getLeads().filter(l=>l.id!==id);saveLeads(leads);toast('Lead deleted','info');renderLeads();renderDashboard();
}

function exportCSV(){
  const leads=getLeads();if(!leads.length){toast('No leads to export','error');return;}
  const h=['Name','Email','Phone','Company','Status','Follow-up','Notes'];
  const rows=leads.map(l=>[l.name,l.email,l.phone,l.company,l.status,l.followup,l.notes].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const blob=new Blob([h.join(',')+'\n'+rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leads.csv';a.click();
  toast('CSV exported','success');
}

function toast(msg,type='info'){
  const d=document.createElement('div');d.className=`toast toast-${type}`;d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),3000);
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

renderDashboard();
</script>
</body>
</html>
